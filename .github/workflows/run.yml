name: Minecraft Server 32GB
on: 
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Paste your Ngrok Authtoken here'
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Java 17 (Required for 1.20.1)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download Minecraft Server 1.20.1 & Install Ngrok
      run: |
        wget https://github.com/maccelerated/minecraft-server-jars/releases/download/1.20.1/server.jar -O server.jar
        echo "eula=true" > eula.txt
        
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"

    - name: Start Ngrok Tunnel & Get IP
      run: |
        ngrok tcp 25565 --log=stdout > ngrok.log &
        sleep 10
        
        echo "=============================================="
        echo "🟢 YOUR MINECRAFT SERVER IP IS:"
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///'
        echo "=============================================="

    - name: Run Server with 30GB RAM
      run: |
        java -Xmx30G -Xms30G -jar server.jar nogui
