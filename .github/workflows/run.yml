name: Minecraft Server 32GB
on: 
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Run Server with 32GB RAM
      run: |
        wget https://piston-data.mojang.com/v1/objects/8dd1a2870413c75fcdab3b1e45212644402a226b/server.jar -O server.jar
        echo "eula=true" > eula.txt
        java -Xmx30G -Xms30G -jar server.jar nogui

